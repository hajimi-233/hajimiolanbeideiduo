<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>夏の日 · 贪吃蛇</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=ZCOOL+KuaiLe&display=swap');

  :root {
    --bg: #e8dcc8;
    --surface: #f5ecd7;
    --text: #3a2a30;
    --textDim: #7a6a70;
    --accent: #c4707a;
    --accent2: #8b7ab4;
    --accent3: #d4a84a;
    --danger: #c4505a;
    --cyan: #5aafc4;
    --mint: #6aaf8a;
    --outline: #3a2a30;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8dcc8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: 'Noto Sans SC', 'ZCOOL KuaiLe', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    position: relative;
  }

  /* Retro flat clouds — warm cream on muted sky */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 160px 58px at 12% 22%, rgba(245,236,215,0.8), transparent),
      radial-gradient(ellipse 180px 64px at 15% 19%, rgba(250,244,232,0.5), transparent),
      radial-gradient(ellipse 110px 44px at 73% 30%, rgba(245,236,215,0.7), transparent),
      radial-gradient(ellipse 130px 50px at 76% 27%, rgba(250,244,232,0.45), transparent),
      radial-gradient(ellipse 95px 40px at 48% 68%, rgba(245,236,215,0.6), transparent),
      radial-gradient(ellipse 115px 46px at 50% 65%, rgba(250,244,232,0.35), transparent);
  }

  /* Retro decorative line art */
  body::after {
    content: '';
    position: fixed;
    bottom: 18px;
    right: 28px;
    width: 80px;
    height: 3px;
    background: rgba(58,42,48,0.12);
    pointer-events: none;
    z-index: 0;
    border-radius: 2px;
    box-shadow: 0 8px 0 rgba(58,42,48,0.08), 0 16px 0 rgba(58,42,48,0.04);
  }

  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 16px;
    max-width: 680px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  /* Header — flat panel with solid outline */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 600px;
    padding: 12px 20px;
    background: var(--surface);
    border-radius: 10px;
    border: 2.5px solid var(--outline);
    box-shadow: 3px 3px 0 rgba(58,42,48,0.12);
  }

  .title {
    font-size: clamp(1.1rem, 2.8vw, 1.5rem);
    color: var(--text);
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 900;
  }

  .title .emoji {
    font-size: 1.3em;
  }

  .score-panel {
    display: flex;
    gap: 18px;
    align-items: center;
  }

  .score-item {
    text-align: center;
  }

  .score-label {
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: var(--textDim);
    text-transform: uppercase;
  }

  .score-value {
    font-size: 1.3rem;
    color: var(--text);
    font-weight: 700;
  }

  .score-value.pop {
    color: var(--accent3);
    transform: scale(1.15);
  }

  /* Canvas container — thick outline, retro offset shadow */
  .canvas-container {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    border: 3px solid var(--outline);
    box-shadow: 5px 5px 0 rgba(58,42,48,0.15);
    background: #f5ecd7;
  }

  canvas {
    display: block;
  }

  /* Overlays — flat panels with thick outlines */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(245,236,215,0.94);
    border-radius: 10px;
    transition: opacity 0.3s ease, visibility 0.3s ease;
    z-index: 10;
  }

  .overlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .overlay-title {
    font-size: clamp(1.3rem, 3.5vw, 1.9rem);
    letter-spacing: 3px;
    margin-bottom: 6px;
    font-weight: 900;
  }

  .overlay-title.start-title {
    color: var(--text);
  }

  .overlay-title.over-title {
    color: var(--danger);
  }

  .overlay-title.pause-title {
    color: var(--accent2);
  }

  .overlay-subtitle {
    color: var(--textDim);
    font-size: 0.8rem;
    margin-bottom: 18px;
    letter-spacing: 2px;
  }

  .overlay-score {
    font-size: 2.8rem;
    color: var(--text);
    margin: 4px 0;
    font-weight: 900;
  }

  .overlay-label {
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: var(--textDim);
  }

  .new-highscore {
    color: var(--accent3) !important;
    font-weight: 900;
  }

  /* Buttons — flat with thick outline, retro offset shadow */
  .btn {
    font-family: inherit;
    font-size: 0.85rem;
    letter-spacing: 2px;
    padding: 11px 30px;
    border: 2.5px solid var(--outline);
    border-radius: 8px;
    background: #f5ecd7;
    color: var(--text);
    cursor: pointer;
    transition: all 0.1s ease;
    margin: 5px;
    box-shadow: 3px 3px 0 rgba(58,42,48,0.12);
    font-weight: 700;
    position: relative;
  }

  .btn:hover {
    background: #ede0c8;
    box-shadow: 4px 4px 0 rgba(58,42,48,0.18);
    transform: translate(-1px, -1px);
  }

  .btn:active {
    box-shadow: 1px 1px 0 rgba(58,42,48,0.12);
    transform: translate(2px, 2px);
    transition: transform 0.05s ease;
  }

  .btn.primary {
    background: #c4707a;
    border-color: var(--outline);
    color: #fdf5f0;
    box-shadow: 3px 3px 0 rgba(58,42,48,0.15);
  }

  .btn.primary:hover {
    background: #b0606a;
    box-shadow: 4px 4px 0 rgba(58,42,48,0.2);
  }

  /* Difficulty */
  .difficulty-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .diff-btn {
    font-family: inherit;
    font-size: 0.75rem;
    padding: 6px 16px;
    border-radius: 6px;
    border: 2px solid var(--outline);
    background: #f5ecd7;
    color: var(--textDim);
    cursor: pointer;
    transition: all 0.1s ease;
    letter-spacing: 1px;
    font-weight: 700;
  }

  .diff-btn.active {
    background: #3a2a30;
    border-color: #3a2a30;
    color: #f5ecd7;
  }

  .diff-btn:hover {
    background: #ede0c8;
    color: var(--text);
  }

  .diff-btn.active:hover {
    background: #3a2a30;
    color: #f5ecd7;
  }

  /* D-Pad */
  .dpad {
    display: none;
    position: relative;
    width: 140px;
    height: 140px;
    margin-top: 4px;
  }

  .dpad.visible { display: block; }

  .dpad-btn {
    position: absolute;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    border: 2.5px solid var(--outline);
    background: #f5ecd7;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.08s ease;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 2px 2px 0 rgba(58,42,48,0.1);
  }

  .dpad-btn:active {
    background: #ede0c8;
    box-shadow: 0px 0px 0 rgba(58,42,48,0.1);
    transform: translate(2px, 2px);
  }

  .dpad-btn svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: var(--outline);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .dpad-up    { top: 0;   left: 48px; }
  .dpad-down  { bottom: 0; left: 48px; }
  .dpad-left  { top: 48px; left: 0; }
  .dpad-right { top: 48px; right: 0; }
  .dpad-center { top: 48px; left: 48px; border-radius: 50%; opacity: 0.2; border-color: var(--outline); }

  /* Key hints */
  .key-hints {
    display: flex;
    gap: 16px;
    font-size: 0.7rem;
    color: var(--textDim);
    letter-spacing: 1px;
  }

  .key-hints kbd {
    display: inline-block;
    padding: 3px 9px;
    border: 2px solid var(--outline);
    border-radius: 6px;
    background: #f5ecd7;
    color: var(--textDim);
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 700;
  }

  /* Combo pop */
  .combo-pop {
    position: absolute;
    pointer-events: none;
    font-family: inherit;
    font-size: 1.1rem;
    color: var(--text);
    font-weight: 900;
    z-index: 15;
    animation: combo-float 0.8s ease-out forwards;
  }

  @keyframes combo-float {
    0%   { opacity: 1; transform: translateY(0) scale(0.8); }
    40%  { opacity: 1; transform: translateY(-18px) scale(1.15); }
    100% { opacity: 0; transform: translateY(-55px) scale(1); }
  }

  @media (max-width: 480px) {
    .game-wrapper { gap: 6px; padding: 6px; }
    .key-hints { display: none; }
    .title { font-size: 1rem; letter-spacing: 1px; }
    .score-value { font-size: 1.1rem; }
    .header { padding: 10px 14px; border-radius: 8px; }
    .canvas-container { border-radius: 10px; }
    .btn { padding: 10px 24px; font-size: 0.8rem; }
  }

  @media (pointer: coarse) {
    .dpad.visible { display: block; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <!-- Header -->
  <div class="header">
    <span class="title"><span class="emoji">☀️</span>夏 の ヘ ビ<span class="emoji">🌻</span></span>
    <div class="score-panel">
      <div class="score-item">
        <div class="score-label">得点</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">最高</div>
        <div class="score-value" id="highscore" style="color:#ffb347;">0</div>
      </div>
    </div>
  </div>

  <!-- Game Canvas -->
  <div class="canvas-container" id="canvasContainer">
    <canvas id="gameCanvas"></canvas>

    <!-- Start Overlay -->
    <div class="overlay" id="startOverlay">
      <div style="font-size:3rem;margin-bottom:4px;">☀️🐍🌻</div>
      <div class="overlay-title start-title">夏 の ヘ ビ</div>
      <div class="overlay-subtitle">— 夏日贪吃蛇 —</div>
      <div class="difficulty-selector" id="diffSelector">
        <button class="diff-btn" data-diff="easy">☀️ 简单</button>
        <button class="diff-btn active" data-diff="normal">🌤️ 普通</button>
        <button class="diff-btn" data-diff="hard">⛅ 困难</button>
        <button class="diff-btn" data-diff="extreme">🌩️ 极限</button>
      </div>
      <button class="btn primary" id="btnStart">开 始 游 戏</button>
      <div class="key-hints" style="margin-top:14px;">
        <span><kbd>↑↓←→</kbd> / <kbd>WASD</kbd></span>
        <span><kbd>空格</kbd> 暂停</span>
      </div>
    </div>

    <!-- Pause Overlay -->
    <div class="overlay hidden" id="pauseOverlay">
      <div style="font-size:3rem;margin-bottom:4px;">⏸️</div>
      <div class="overlay-title pause-title">暂 停 中</div>
      <div class="overlay-subtitle">— 休息一下 —</div>
      <button class="btn primary" id="btnResume">继 续</button>
      <button class="btn" id="btnRestart">重 来</button>
    </div>

    <!-- Game Over Overlay -->
    <div class="overlay hidden" id="gameoverOverlay">
      <div style="font-size:3rem;margin-bottom:4px;">🌅</div>
      <div class="overlay-title over-title">游 戏 结 束</div>
      <div class="overlay-subtitle">— 夏日的黄昏 —</div>
      <div class="overlay-score" id="finalScore">0</div>
      <div class="overlay-label" id="highscoreLabel">最高分 0</div>
      <div style="margin-top:16px;">
        <button class="btn primary" id="btnPlayAgain">再 来 一 局</button>
        <button class="btn" id="btnHome">返 回</button>
      </div>
    </div>
  </div>

  <!-- D-Pad -->
  <div class="dpad visible" id="dpad">
    <div class="dpad-btn dpad-up" data-dir="up">
      <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    </div>
    <div class="dpad-btn dpad-down" data-dir="down">
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="dpad-btn dpad-left" data-dir="left">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="dpad-btn dpad-right" data-dir="right">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    <div class="dpad-btn dpad-center">☀</div>
  </div>

  <div class="key-hints">
    <span><kbd>↑↓←→</kbd> / <kbd>WASD</kbd> 移动</span>
    <span><kbd>空格</kbd> 暂停</span>
  </div>
</div>

<script>
// ============================================================
//  🌸 CONFIGURATION
// ============================================================
const CONFIG = {
  GRID: 20,
  DIFFICULTY: {
    easy:    { label: '简单',  interval: 160, foodBonus: 10,  goldenChance: 0.12, speedGrowth: 0.3 },
    normal:  { label: '普通',  interval: 120, foodBonus: 15,  goldenChance: 0.10, speedGrowth: 0.5 },
    hard:    { label: '困难',  interval: 85,  foodBonus: 20,  goldenChance: 0.08, speedGrowth: 0.7 },
    extreme: { label: '极限',  interval: 55,  foodBonus: 30,  goldenChance: 0.06, speedGrowth: 0.9 },
  },
  MIN_INTERVAL: 35,
  COMBO_WINDOW: 2000,
  MAX_PARTICLES: 250,
  SCREEN_SHAKE_DURATION: 400,
  SNAKE_BODY_PADDING: 0.1,
};

// ============================================================
//  🎵 AUDIO SYSTEM (Procedural - cute chiptune style)
// ============================================================
class AudioSystem {
  constructor() {
    this.ctx = null;
    this.enabled = true;
  }
  init() {
    if (this.ctx) return;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { this.enabled = false; }
  }
  play(freq, type, duration, vol = 0.06, glideTo = null) {
    if (!this.enabled || !this.ctx) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (glideTo) osc.frequency.linearRampToValueAtTime(glideTo, t + duration);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start(t);
    osc.stop(t + duration);
  }
  eat()       { this.play(660, 'sine', 0.1, 0.05, 880); }
  eatGolden() { this.play(880, 'sine', 0.12, 0.07, 1320);
                setTimeout(() => this.play(1100, 'sine', 0.1, 0.06, 1650), 70); }
  die()       { this.play(200, 'triangle', 0.3, 0.06, 80);
                setTimeout(() => this.play(120, 'triangle', 0.35, 0.07, 50), 120); }
  turn()      { this.play(300, 'sine', 0.03, 0.02, 420); }
  combo()     { this.play(800, 'sine', 0.07, 0.05, 1200); }
}

// ============================================================
//  🌸 PARTICLE SYSTEM
// ============================================================
class Particle {
  constructor(x, y, vx, vy, life, size, color, type = 'circle') {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life;
    this.size = size; this.color = color;
    this.type = type; // 'circle' | 'petal' | 'sparkle' | 'heart'
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 4;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += 80 * dt;
    this.life -= dt;
    this.rotation += this.rotSpeed * dt;
  }
  get alpha() { return Math.max(0, this.life / this.maxLife); }
  get alive() { return this.life > 0; }

  render(ctx) {
    const a = this.alpha;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    const s = this.size * (0.5 + 0.5 * a);

    switch (this.type) {
      case 'petal':
        this._drawPetal(ctx, s);
        break;
      case 'sparkle':
        this._drawSparkle(ctx, s);
        break;
      case 'heart':
        this._drawHeart(ctx, s);
        break;
      default:
        this._drawCircle(ctx, s);
    }
    ctx.restore();
  }

  _drawCircle(ctx, s) {
    ctx.fillStyle = this.color;
    ctx.strokeStyle = 'rgba(58,42,48,0.5)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(0, 0, s, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }

  _drawPetal(ctx, s) {
    ctx.fillStyle = this.color;
    ctx.strokeStyle = 'rgba(58,42,48,0.4)';
    ctx.lineWidth = 0.6;
    // 5-petal sakura shape
    for (let i = 0; i < 5; i++) {
      const angle = (Math.PI * 2 * i) / 5 - Math.PI / 2;
      const px = Math.cos(angle) * s * 0.5;
      const py = Math.sin(angle) * s * 0.5;
      ctx.beginPath();
      ctx.arc(px, py, s * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
    // Center dot
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(58,42,48,0.3)';
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }

  _drawSparkle(ctx, s) {
    ctx.fillStyle = this.color;
    ctx.strokeStyle = 'rgba(58,42,48,0.45)';
    ctx.lineWidth = 0.7;
    // 4-pointed star
    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.quadraticCurveTo(s * 0.4, 0, 0, s);
    ctx.quadraticCurveTo(-s * 0.4, 0, 0, -s);
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-s, 0);
    ctx.quadraticCurveTo(0, s * 0.4, s, 0);
    ctx.quadraticCurveTo(0, -s * 0.4, -s, 0);
    ctx.fill();
    ctx.stroke();
  }

  _drawHeart(ctx, s) {
    ctx.fillStyle = this.color;
    ctx.strokeStyle = 'rgba(58,42,48,0.5)';
    ctx.lineWidth = 0.8;
    const sz = s * 0.6;
    ctx.beginPath();
    ctx.moveTo(0, sz * 0.3);
    ctx.bezierCurveTo(-sz, -sz * 0.6, -sz, sz * 0.4, 0, sz);
    ctx.bezierCurveTo(sz, sz * 0.4, sz, -sz * 0.6, 0, sz * 0.3);
    ctx.fill();
    ctx.stroke();
  }
}

class ParticleSystem {
  constructor() {
    this.particles = [];
  }
  emit(x, y, color, count, speed = 160, types = null) {
    const typeOptions = types || ['circle'];
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.8;
      const spd = speed * (0.3 + Math.random() * 0.7);
      const life = 0.35 + Math.random() * 0.6;
      const size = 1.5 + Math.random() * 3.5;
      const type = typeOptions[Math.floor(Math.random() * typeOptions.length)];
      this.particles.push(new Particle(
        x, y,
        Math.cos(angle) * spd,
        Math.sin(angle) * spd,
        life, size, color, type
      ));
    }
    while (this.particles.length > CONFIG.MAX_PARTICLES) {
      this.particles.shift();
    }
  }
  update(dt) {
    for (const p of this.particles) p.update(dt);
    this.particles = this.particles.filter(p => p.alive);
  }
  render(ctx) {
    for (const p of this.particles) p.render(ctx);
  }
}

// ============================================================
//  🍙 FOOD
// ============================================================
class Food {
  constructor(gridSize) {
    this.grid = gridSize;
    this.x = 0; this.y = 0;
    this.type = 'normal';
    this.spawnTime = 0;
  }

  spawn(snake, difficulty) {
    const occupied = new Set(snake.segments.map(s => `${s.x},${s.y}`));
    const available = [];
    for (let x = 0; x < this.grid; x++)
      for (let y = 0; y < this.grid; y++)
        if (!occupied.has(`${x},${y}`)) available.push({x, y});
    if (available.length === 0) return false;
    const pos = available[Math.floor(Math.random() * available.length)];
    this.x = pos.x; this.y = pos.y;
    this.spawnTime = performance.now();
    const r = Math.random();
    if (r < difficulty.goldenChance) this.type = 'golden';
    else if (r < difficulty.goldenChance + 0.06) this.type = 'speed';
    else this.type = 'normal';
    return true;
  }

  get score() {
    if (this.type === 'golden') return 50;
    if (this.type === 'speed') return 5;
    return 10;
  }
  get color() {
    if (this.type === 'golden') return '#d4a84a';
    if (this.type === 'speed') return '#5aafc4';
    return '#c4707a';
  }
  get label() {
    if (this.type === 'golden') return '⭐';
    if (this.type === 'speed') return '⚡';
    return '🍙';
  }
}

// ============================================================
//  🐍 SNAKE
// ============================================================
class Snake {
  constructor(gridSize) {
    this.grid = gridSize;
    this.reset();
  }
  reset() {
    const mid = Math.floor(this.grid / 2);
    this.segments = [
      {x: mid, y: mid},
      {x: mid - 1, y: mid},
      {x: mid - 2, y: mid},
    ];
    this.prevSegments = this.segments.map(s => ({...s}));
    this.direction = {x: 1, y: 0};
    this.nextDirection = {x: 1, y: 0};
    this.growing = false;
    this.growCount = 0;
  }
  get head() { return this.segments[0]; }
  changeDirection(dx, dy) {
    if (dx === -this.direction.x && dy === -this.direction.y && this.segments.length > 1) return;
    if (dx === 0 && dy === 0) return;
    this.nextDirection = {x: dx, y: dy};
  }
  update() {
    this.prevSegments = this.segments.map(s => ({...s}));
    this.direction = {...this.nextDirection};
    this.segments.unshift({
      x: this.head.x + this.direction.x,
      y: this.head.y + this.direction.y,
    });
    if (this.growing) {
      this.growCount--;
      if (this.growCount <= 0) this.growing = false;
    } else {
      this.segments.pop();
    }
  }
  grow(n = 1) { this.growing = true; this.growCount += n; }
  checkSelfCollision() {
    const h = this.head;
    for (let i = 1; i < this.segments.length; i++)
      if (this.segments[i].x === h.x && this.segments[i].y === h.y) return true;
    return false;
  }
  checkWallCollision() {
    const h = this.head;
    return h.x < 0 || h.x >= this.grid || h.y < 0 || h.y >= this.grid;
  }
  get length() { return this.segments.length; }
}

// ============================================================
//  💬 FLOATING TEXT
// ============================================================
class FloatingText {
  constructor(x, y, text, color, life = 0.7) {
    this.x = x; this.y = y;
    this.text = text; this.color = color;
    this.life = life; this.maxLife = life;
  }
  update(dt) { this.y -= 55 * dt; this.life -= dt; }
  get alive() { return this.life > 0; }
  get alpha() { return Math.max(0, this.life / this.maxLife); }
  render(ctx) {
    const a = this.alpha;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = this.color;
    ctx.strokeStyle = 'rgba(58,42,48,0.4)';
    ctx.lineWidth = 2;
    ctx.font = 'bold 15px "Noto Sans SC", "ZCOOL KuaiLe", sans-serif';
    ctx.textAlign = 'center';
    ctx.strokeText(this.text, this.x, this.y);
    ctx.fillText(this.text, this.x, this.y);
    ctx.restore();
  }
}

// ============================================================
//  🎮 GAME
// ============================================================
class Game {
  constructor() {
    this.canvas = document.getElementById('gameCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.container = document.getElementById('canvasContainer');

    this.audio = new AudioSystem();
    this.particles = new ParticleSystem();
    this.floatingTexts = [];

    this.gridSize = CONFIG.GRID;
    this.snake = new Snake(this.gridSize);
    this.food = new Food(this.gridSize);

    this.difficulty = 'normal';
    this.diffConfig = CONFIG.DIFFICULTY.normal;
    this.score = 0;
    this.highScore = parseInt(localStorage.getItem('snakeHighScoreAnime')) || 0;
    this.combo = 0;
    this.lastEatTime = 0;
    this.comboMultiplier = 1;

    this.state = 'start';
    this.lastTickTime = 0;
    this.tickInterval = this.diffConfig.interval;
    this.animFrameId = null;
    this.screenShake = 0;
    this.screenShakeDuration = 0;
    this.time = 0;

    this.cellSize = 30;
    this.canvasSize = 600;
    this.speedBoostActive = false;
    this.speedBoostTimer = 0;

    // Ambient sakura petals
    this.ambientPetals = [];
    this._initAmbientPetals();

    this.resize();
    this.bindEvents();
    this.updateUI();
  }

  // ---- Resize ----
  resize() {
    const maxW = Math.min(window.innerWidth - 20, 640);
    const maxH = Math.min(window.innerHeight - 280, 640);
    const size = Math.floor(Math.min(maxW, maxH) / this.gridSize) * this.gridSize;
    this.canvasSize = Math.max(size, 400);
    this.cellSize = this.canvasSize / this.gridSize;
    this.canvas.width = this.canvasSize;
    this.canvas.height = this.canvasSize;
    this.canvas.style.width = this.canvasSize + 'px';
    this.canvas.style.height = this.canvasSize + 'px';
  }

  // ---- Events ----
  bindEvents() {
    window.addEventListener('resize', () => this.resize());

    window.addEventListener('keydown', (e) => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
      switch (e.code) {
        case 'ArrowUp': case 'KeyW': this.handleDirection(0, -1); break;
        case 'ArrowDown': case 'KeyS': this.handleDirection(0, 1); break;
        case 'ArrowLeft': case 'KeyA': this.handleDirection(-1, 0); break;
        case 'ArrowRight': case 'KeyD': this.handleDirection(1, 0); break;
        case 'Space': this.handlePause(); break;
      }
    });

    let touchStartX = 0, touchStartY = 0;
    this.canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }
    }, {passive: true});
    this.canvas.addEventListener('touchend', (e) => {
      if (this.state === 'start') { this.startGame(); return; }
      if (this.state === 'gameover') { this.startGame(); return; }
      const dx = (e.changedTouches[0]?.clientX || 0) - touchStartX;
      const dy = (e.changedTouches[0]?.clientY || 0) - touchStartY;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
      if (Math.abs(dx) > Math.abs(dy))
        this.handleDirection(dx > 0 ? 1 : -1, 0);
      else
        this.handleDirection(0, dy > 0 ? 1 : -1);
    });

    document.querySelectorAll('.dpad-btn[data-dir]').forEach(btn => {
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        const d = btn.dataset.dir;
        const map = { up: [0,-1], down: [0,1], left: [-1,0], right: [1,0] };
        this.handleDirection(...map[d]);
      });
    });

    document.getElementById('btnStart').addEventListener('click', () => this.startGame());
    document.getElementById('btnResume').addEventListener('click', () => this.resumeGame());
    document.getElementById('btnRestart').addEventListener('click', () => this.startGame());
    document.getElementById('btnPlayAgain').addEventListener('click', () => this.startGame());
    document.getElementById('btnHome').addEventListener('click', () => this.goHome());

    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.difficulty = btn.dataset.diff;
        this.diffConfig = CONFIG.DIFFICULTY[this.difficulty];
        this.tickInterval = this.diffConfig.interval;
      });
    });
  }

  handleDirection(dx, dy) {
    if (this.state === 'playing') {
      this.snake.changeDirection(dx, dy);
      this.audio.turn();
    }
  }
  handlePause() {
    if (this.state === 'playing') this.pauseGame();
    else if (this.state === 'paused') this.resumeGame();
  }

  // ---- State ----
  startGame() {
    this.audio.init();
    this.diffConfig = CONFIG.DIFFICULTY[this.difficulty];
    this.tickInterval = this.diffConfig.interval;
    this.snake.reset();
    this.food.spawn(this.snake, this.diffConfig);
    this.score = 0; this.combo = 0; this.lastEatTime = 0; this.comboMultiplier = 1;
    this.particles.particles = [];
    this.floatingTexts = [];
    this.state = 'playing';
    this.lastTickTime = performance.now();
    this._lastFrameTime = undefined;
    this.screenShake = 0;
    this.speedBoostActive = false;
    this.speedBoostTimer = 0;

    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('pauseOverlay').classList.add('hidden');
    document.getElementById('gameoverOverlay').classList.add('hidden');
    document.getElementById('dpad').classList.add('visible');

    this.updateUI();
    if (this.animFrameId) cancelAnimationFrame(this.animFrameId);
    this.animFrameId = requestAnimationFrame((t) => this.loop(t));
  }

  pauseGame() {
    if (this.state !== 'playing') return;
    this.state = 'paused';
    document.getElementById('pauseOverlay').classList.remove('hidden');
  }
  resumeGame() {
    if (this.state !== 'paused') return;
    this.state = 'playing';
    this.lastTickTime = performance.now();
    document.getElementById('pauseOverlay').classList.add('hidden');
  }

  gameOver() {
    this.state = 'gameover';
    this.audio.die();
    this.screenShake = 8;
    this.screenShakeDuration = CONFIG.SCREEN_SHAKE_DURATION;

    const hx = (this.snake.head.x + 0.5) * this.cellSize;
    const hy = (this.snake.head.y + 0.5) * this.cellSize;
    this.particles.emit(hx, hy, '#d4707a', 35, 220, ['heart', 'sparkle', 'circle']);
    this.particles.emit(hx, hy, '#e8b8b0', 20, 140, ['petal']);

    if (this.score > this.highScore) {
      this.highScore = this.score;
      localStorage.setItem('snakeHighScoreAnime', this.highScore);
    }

    document.getElementById('finalScore').textContent = this.score;
    const hsl = document.getElementById('highscoreLabel');
    if (this.score >= this.highScore && this.score > 0) {
      hsl.textContent = '★ 新纪录! ' + this.highScore;
      hsl.classList.add('new-highscore');
    } else {
      hsl.textContent = '最高分 ' + this.highScore;
      hsl.classList.remove('new-highscore');
    }
    document.getElementById('gameoverOverlay').classList.remove('hidden');
    document.getElementById('dpad').classList.remove('visible');
    this.updateUI();
  }

  goHome() {
    this.state = 'start';
    if (this.animFrameId) { cancelAnimationFrame(this.animFrameId); this.animFrameId = null; }
    document.getElementById('startOverlay').classList.remove('hidden');
    document.getElementById('pauseOverlay').classList.add('hidden');
    document.getElementById('gameoverOverlay').classList.add('hidden');
    document.getElementById('dpad').classList.remove('visible');
    this.render(0);
    this.updateUI();
  }

  // ---- Ambient Sakura Petals ----
  _initAmbientPetals() {
    this.ambientPetals = [];
    for (let i = 0; i < 32; i++) {
      this.ambientPetals.push({
        x: Math.random() * 700,
        y: Math.random() * 700,
        vx: (Math.random() - 0.5) * 18,
        vy: 10 + Math.random() * 25,
        size: 2 + Math.random() * 5,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 1.5,
        alpha: 0.12 + Math.random() * 0.25,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }

  _updateAmbientPetals(dt) {
    const W = this.canvasSize;
    for (const p of this.ambientPetals) {
      p.x += p.vx * dt + Math.sin(p.phase + this.time * 0.001) * 5 * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotSpeed * dt;
      if (p.y > W + 20) { p.y = -20; p.x = Math.random() * W; }
      if (p.x < -20) p.x = W + 20;
      if (p.x > W + 20) p.x = -20;
    }
  }

  _renderAmbientPetals(ctx) {
    for (const p of this.ambientPetals) {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      const s = p.size;
      // Cel-shaded tiny sakura petal
      ctx.fillStyle = '#e8b8b0';
      ctx.strokeStyle = 'rgba(58,42,48,0.3)';
      ctx.lineWidth = 0.5;
      for (let i = 0; i < 5; i++) {
        const angle = (Math.PI * 2 * i) / 5 - Math.PI / 2;
        ctx.beginPath();
        ctx.arc(Math.cos(angle) * s * 0.4, Math.sin(angle) * s * 0.4, s * 0.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
      ctx.fillStyle = '#fdf5f0';
      ctx.strokeStyle = 'rgba(58,42,48,0.2)';
      ctx.lineWidth = 0.3;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.15, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
  }

  // ---- Game Loop ----
  loop(timestamp) {
    if (this.state === 'start' || this.state === 'gameover') {
      this.animFrameId = null;
      this.render(0);
      return;
    }
    this.animFrameId = requestAnimationFrame((t) => this.loop(t));

    const dt = Math.min((timestamp - (this._lastFrameTime || timestamp)) / 1000, 0.1);
    this._lastFrameTime = timestamp;
    this.time = timestamp;

    if (this.state === 'playing') {
      if (this.speedBoostActive) {
        this.speedBoostTimer -= dt;
        if (this.speedBoostTimer <= 0) this.speedBoostActive = false;
      }

      let elapsed = timestamp - this.lastTickTime;
      const effInt = this.speedBoostActive ? this.tickInterval * 0.75 : this.tickInterval;
      while (elapsed >= effInt && this.state === 'playing') {
        this.tick();
        elapsed -= effInt;
        this.lastTickTime += effInt;
      }
    }

    // Screen shake
    if (this.screenShakeDuration > 0) {
      this.screenShakeDuration -= dt * 1000;
      this.screenShake = Math.max(0, this.screenShakeDuration / CONFIG.SCREEN_SHAKE_DURATION * 8);
    } else { this.screenShake = 0; }

    this._updateAmbientPetals(dt);
    this.particles.update(dt);
    for (const ft of this.floatingTexts) ft.update(dt);
    this.floatingTexts = this.floatingTexts.filter(ft => ft.alive);

    if (this.combo > 0 && timestamp - this.lastEatTime > CONFIG.COMBO_WINDOW) {
      this.combo = 0; this.comboMultiplier = 1;
    }

    const tp = this.state === 'playing'
      ? Math.min((timestamp - this.lastTickTime) / (this.speedBoostActive ? this.tickInterval * 0.75 : this.tickInterval), 1)
      : 0;
    this.render(tp);
    this.updateUI();
  }

  tick() {
    if (this.state !== 'playing') return;
    this.snake.update();
    if (this.snake.checkWallCollision()) { this.gameOver(); return; }
    if (this.snake.checkSelfCollision()) { this.gameOver(); return; }
    const h = this.snake.head;
    if (h.x === this.food.x && h.y === this.food.y) this.eatFood();
    const gb = Math.floor((this.snake.length - 3) * this.diffConfig.speedGrowth);
    this.tickInterval = Math.max(CONFIG.MIN_INTERVAL, this.diffConfig.interval - gb);
  }

  eatFood() {
    const now = performance.now();
    const foodScore = this.food.score;
    if (now - this.lastEatTime < CONFIG.COMBO_WINDOW) {
      this.combo++;
      this.comboMultiplier = 1 + this.combo * 0.5;
      if (this.combo >= 3) this.audio.combo();
    } else { this.combo = 0; this.comboMultiplier = 1; }
    this.lastEatTime = now;

    const total = Math.floor(foodScore * this.comboMultiplier);
    this.score += total;
    this.snake.grow(1);

    const fx = (this.food.x + 0.5) * this.cellSize;
    const fy = (this.food.y + 0.5) * this.cellSize;

    // Retro cel particles: sparkles + petals + hearts on combo
    const petalColors = ['#e8b8b0', '#d4a89a', '#e8c8b8', '#f0c8b8'];
    this.particles.emit(fx, fy, petalColors[Math.floor(Math.random()*petalColors.length)], 8, 100, ['petal']);
    this.particles.emit(fx, fy, this.food.color, 8, 120, ['sparkle']);

    if (this.combo >= 2) {
      this.particles.emit(fx, fy, '#d4707a', 6, 80, ['heart']);
      this.floatingTexts.push(new FloatingText(fx, fy - 10, `${this.combo}× コンボ!`, '#d4707a', 0.8));
    } else {
      this.floatingTexts.push(new FloatingText(fx, fy - 8, `+${total}`, this.food.color, 0.6));
    }

    if (this.food.type === 'speed') { this.speedBoostActive = true; this.speedBoostTimer = 4; }

    if (this.food.type === 'golden') this.audio.eatGolden();
    else this.audio.eat();

    if (!this.food.spawn(this.snake, this.diffConfig)) {
      this.score += 500;
      this.gameOver();
    }
  }

  // ---- RETRO ANIME CEL RENDERING ----
  render(progress) {
    const ctx = this.ctx;
    const W = this.canvasSize;
    const cs = this.cellSize;

    ctx.save();

    // Screen shake
    if (this.screenShake > 0) {
      ctx.translate(
        (Math.random() - 0.5) * this.screenShake * 2,
        (Math.random() - 0.5) * this.screenShake * 2
      );
    }

    // ---- Background: retro anime sky (low-sat cyan-blue + warm cream clouds) ----
    const skyGrad = ctx.createLinearGradient(0, 0, 0, W);
    skyGrad.addColorStop(0, '#89b5c4');
    skyGrad.addColorStop(0.5, '#b8cfd4');
    skyGrad.addColorStop(0.72, '#dcccb0');
    skyGrad.addColorStop(1, '#e8d5b8');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(-4, -4, W + 8, W + 8);

    // Flat cream cloud clusters (retro anime style)
    ctx.fillStyle = 'rgba(245,236,215,0.72)';
    ctx.strokeStyle = 'rgba(58,42,48,0.06)';
    ctx.lineWidth = 1;
    // Cloud cluster 1 (upper left)
    ctx.beginPath(); ctx.ellipse(W*0.15, W*0.2, W*0.13, W*0.048, -0.08, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(W*0.2, W*0.18, W*0.09, W*0.038, 0.08, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(W*0.11, W*0.18, W*0.07, W*0.032, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    // Cloud cluster 2 (upper right)
    ctx.beginPath(); ctx.ellipse(W*0.78, W*0.25, W*0.11, W*0.042, 0.05, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(W*0.84, W*0.23, W*0.08, W*0.035, -0.04, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    // Cloud cluster 3 (mid right, smaller)
    ctx.beginPath(); ctx.ellipse(W*0.72, W*0.45, W*0.08, W*0.032, 0.03, 0, Math.PI*2); ctx.fill(); ctx.stroke();

    // Grid — subtle dark lines
    ctx.strokeStyle = 'rgba(58,42,48,0.1)';
    ctx.lineWidth = 0.4;
    for (let i = 0; i <= this.gridSize; i++) {
      const pos = i * cs;
      ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, W); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(W, pos); ctx.stroke();
    }

    // Inner border — dark cel-shaded frame outline
    ctx.strokeStyle = 'rgba(58,42,48,0.25)';
    ctx.lineWidth = 3;
    ctx.strokeRect(1.5, 1.5, W - 3, W - 3);

    // Ambient petals (retro style)
    this._renderAmbientPetals(ctx);

    // ---- Snake Rendering (cel-shaded retro anime) ----
    const snake = this.snake;
    const segs = snake.segments;
    const prev = snake.prevSegments;
    const OUTLINE = '#3a2a30';

    // Flat body colors: warm peach → muted coral (alternating)
    const COLOR_A = '#f4b8a0'; // warm peach
    const COLOR_B = '#f4c8b4'; // lighter peach
    const COLOR_HEAD = '#f4a88a'; // slightly deeper peach for head
    const SHADOW_A = '#d49880'; // flat shadow for A
    const SHADOW_B = '#d4a894'; // flat shadow for B
    const SHADOW_HEAD = '#d48870'; // flat shadow for head
    const HIGHLIGHT = '#fde4d8'; // flat highlight

    // Draw body → tail (head drawn last = on top)
    for (let i = segs.length - 1; i >= 0; i--) {
      const curr = segs[i];
      const p = (i < prev.length) ? prev[i] : curr;
      const px = (p.x + (curr.x - p.x) * progress + 0.5) * cs;
      const py = (p.y + (curr.y - p.y) * progress + 0.5) * cs;
      const pad = cs * CONFIG.SNAKE_BODY_PADDING;
      const segSize = cs - pad * 2;
      const isHead = (i === 0);
      const alpha = 1 - (i / segs.length) * 0.15;
      const radius = segSize * 0.4;
      const x = px - segSize/2;
      const y = py - segSize/2;

      ctx.save();
      ctx.globalAlpha = alpha;

      // Pick flat colors
      let baseColor, shadowColor;
      if (isHead) { baseColor = COLOR_HEAD; shadowColor = SHADOW_HEAD; }
      else if (i % 2 === 0) { baseColor = COLOR_A; shadowColor = SHADOW_A; }
      else { baseColor = COLOR_B; shadowColor = SHADOW_B; }

      // 1. Base fill
      ctx.fillStyle = baseColor;
      roundRect(ctx, x, y, segSize, segSize, radius);
      ctx.fill();

      // 2. Hard-edge shadow (bottom-right quadrant) — cel shading
      ctx.fillStyle = shadowColor;
      ctx.beginPath();
      ctx.moveTo(x + segSize * 0.35, y + segSize);
      ctx.lineTo(x + segSize, y + segSize);
      ctx.lineTo(x + segSize, y + segSize * 0.35);
      ctx.arc(x + segSize - radius, y + segSize - radius, radius, 0, Math.PI/2);
      ctx.fill();

      // 3. Hard-edge highlight (top-left quadrant)
      ctx.fillStyle = HIGHLIGHT;
      ctx.beginPath();
      ctx.moveTo(x, y + segSize * 0.25);
      ctx.lineTo(x, y);
      ctx.lineTo(x + segSize * 0.25, y);
      ctx.arc(x + radius, y + radius, radius, Math.PI, Math.PI*1.5);
      ctx.fill();

      // 4. Thick outline
      ctx.strokeStyle = OUTLINE;
      ctx.lineWidth = 2;
      roundRect(ctx, x, y, segSize, segSize, radius);
      ctx.stroke();

      ctx.restore();

      // 🎀 Ribbon/bow on head (cel-shaded)
      if (isHead) {
        const dir = snake.direction;
        const bowX = px - dir.x * cs * 0.28;
        const bowY = py - dir.y * cs * 0.28;
        ctx.save();
        ctx.globalAlpha = alpha;
        // Left loop
        ctx.fillStyle = '#d4707a';
        ctx.strokeStyle = OUTLINE;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(bowX - 1.5, bowY - 2, segSize*0.22, segSize*0.13, -0.5, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
        // Right loop
        ctx.beginPath();
        ctx.ellipse(bowX + 1.5, bowY + 2, segSize*0.22, segSize*0.13, 0.5, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
        // Center knot
        ctx.fillStyle = '#f5ecd7';
        ctx.beginPath();
        ctx.arc(bowX, bowY, segSize*0.07, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
        ctx.restore();
      }

      // 👁️ Retro Anime Eyes (cel-shaded, outlined)
      if (isHead) {
        const dir = snake.direction;
        const eyeOffX = dir.x * cs * 0.12;
        const eyeOffY = dir.y * cs * 0.12;
        const eyeRX = segSize * 0.24;
        const eyeRY = segSize * 0.30;

        const perpX = -dir.y;
        const perpY = -dir.x;
        const eyePositions = [
          { x: px + perpX * cs * 0.18 + eyeOffX, y: py + perpY * cs * 0.18 + eyeOffY },
          { x: px - perpX * cs * 0.18 + eyeOffX, y: py - perpY * cs * 0.18 + eyeOffY },
        ];

        for (const ep of eyePositions) {
          // Eye white — flat white oval with outline
          ctx.fillStyle = '#fff';
          ctx.strokeStyle = OUTLINE;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.ellipse(ep.x, ep.y, eyeRX, eyeRY, 0, 0, Math.PI * 2);
          ctx.fill(); ctx.stroke();

          // Upper eyelid — thick line (retro anime look)
          ctx.strokeStyle = OUTLINE;
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.ellipse(ep.x, ep.y - eyeRY * 0.12, eyeRX * 0.85, eyeRY * 0.45, 0, Math.PI, 0);
          ctx.stroke();

          // Iris — flat amber/brown (retro anime eye color)
          const irisR = eyeRX * 0.6;
          ctx.fillStyle = '#b89060';
          ctx.strokeStyle = OUTLINE;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(ep.x + dir.x * 0.8, ep.y + dir.y * 0.8, irisR, 0, Math.PI * 2);
          ctx.fill(); ctx.stroke();

          // Pupil — solid dark
          ctx.fillStyle = OUTLINE;
          ctx.beginPath();
          ctx.arc(ep.x + dir.x * 1.2, ep.y + dir.y * 1.2, irisR * 0.52, 0, Math.PI * 2);
          ctx.fill();

          // ✨ Hard white sparkle highlights (cel-style, no soft glow)
          ctx.fillStyle = '#fff';
          ctx.strokeStyle = 'transparent';
          ctx.lineWidth = 0;
          // Large highlight upper-left
          ctx.beginPath();
          ctx.arc(ep.x - irisR*0.25, ep.y - irisR*0.35, irisR * 0.32, 0, Math.PI * 2);
          ctx.fill();
          // Small highlight lower-right
          ctx.beginPath();
          ctx.arc(ep.x + irisR*0.3, ep.y + irisR*0.25, irisR * 0.14, 0, Math.PI * 2);
          ctx.fill();
        }

        // 😊 Blush — flat pink ellipse with soft outline
        for (const ep of eyePositions) {
          ctx.fillStyle = 'rgba(220,140,130,0.5)';
          ctx.strokeStyle = 'rgba(180,100,90,0.4)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.ellipse(
            ep.x - perpX * cs * 0.12,
            ep.y - perpY * cs * 0.12 + eyeRY * 0.6,
            eyeRX * 0.5, eyeRY * 0.28, 0, 0, Math.PI * 2
          );
          ctx.fill(); ctx.stroke();
        }

        // Tiny :3 mouth — simple curve
        ctx.fillStyle = OUTLINE;
        ctx.beginPath();
        const mouthX = px + dir.x * cs * 0.2;
        const mouthY = py + dir.y * cs * 0.2;
        ctx.arc(mouthX, mouthY + 0.5, segSize * 0.09, 0, Math.PI);
        ctx.fill();
      }
    }

    // ---- Food Rendering ----
    if (this.state !== 'start') {
      const fx = (this.food.x + 0.5) * cs;
      const fy = (this.food.y + 0.5) * cs;
      const foodR = cs * 0.37;
      const pulse = 1 + Math.sin(this.time * 0.005) * (this.food.type === 'golden' ? 0.16 : 0.06);

      ctx.save();
      const FO_OUTLINE = '#3a2a30';

      if (this.food.type === 'golden') {
        // ⭐ Star — flat gold with outline
        ctx.fillStyle = '#d4a84a';
        ctx.strokeStyle = FO_OUTLINE;
        ctx.lineWidth = 2;
        drawStar(ctx, fx, fy, foodR * pulse, foodR * pulse * 0.45, 5);
        ctx.fill();
        ctx.stroke();
        // Hard highlight (smaller star top-left)
        ctx.fillStyle = 'rgba(255,240,210,0.6)';
        ctx.strokeStyle = 'transparent';
        ctx.lineWidth = 0;
        drawStar(ctx, fx - 1, fy - 1.5, foodR * pulse * 0.5, foodR * pulse * 0.2, 5);
        ctx.fill();
      } else if (this.food.type === 'speed') {
        // ⚡ Cyan diamond — flat with outline (retro cel)
        ctx.fillStyle = '#5aafc4';
        ctx.strokeStyle = FO_OUTLINE;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(fx, fy - foodR * pulse);
        ctx.lineTo(fx + foodR * pulse * 0.55, fy);
        ctx.lineTo(fx, fy + foodR * pulse);
        ctx.lineTo(fx - foodR * pulse * 0.55, fy);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        // Hard highlight triangle (top half)
        ctx.fillStyle = 'rgba(220,245,250,0.6)';
        ctx.strokeStyle = 'transparent';
        ctx.lineWidth = 0;
        ctx.beginPath();
        ctx.moveTo(fx, fy - foodR * pulse * 0.55);
        ctx.lineTo(fx + foodR * pulse * 0.22, fy - foodR * pulse * 0.05);
        ctx.lineTo(fx - foodR * pulse * 0.22, fy - foodR * pulse * 0.05);
        ctx.closePath();
        ctx.fill();
        // ⚡ icon
        ctx.fillStyle = '#fff';
        ctx.strokeStyle = FO_OUTLINE;
        ctx.lineWidth = 0.8;
        ctx.font = `bold ${foodR * 0.85}px "Noto Sans SC", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.strokeText('⚡', fx, fy + 0.5);
        ctx.fillText('⚡', fx, fy + 0.5);
      } else {
        // 🍙 Onigiri — flat white triangle with dark nori outline
        const triH = foodR * pulse * 1.1;
        const triW = foodR * pulse * 0.85;
        // Rice body
        ctx.fillStyle = '#fdfaf5';
        ctx.strokeStyle = FO_OUTLINE;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(fx, fy - triH);
        ctx.lineTo(fx + triW, fy + triH * 0.5);
        ctx.lineTo(fx - triW, fy + triH * 0.5);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        // Nori strip with outline
        ctx.fillStyle = '#3a2a30';
        ctx.fillRect(fx - triW * 0.58, fy + triH * 0.1, triW * 1.16, triH * 0.28);
        // Rice texture (subtle dots)
        ctx.fillStyle = 'rgba(180,170,160,0.4)';
        for (let d = 0; d < 2; d++) {
          ctx.beginPath();
          ctx.arc(fx + (d-0.5) * triW * 0.28, fy - triH * 0.25, 0.8, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();
    }

    // ---- Particles & Floating Text ----
    this.particles.render(ctx);
    for (const ft of this.floatingTexts) ft.render(ctx);

    ctx.restore();
  }

  // ---- UI Update ----
  updateUI() {
    const scoreEl = document.getElementById('score');
    const prev = parseInt(scoreEl.textContent);
    if (this.score !== prev) {
      scoreEl.textContent = this.score;
      scoreEl.classList.add('pop');
      setTimeout(() => scoreEl.classList.remove('pop'), 150);
    }
    document.getElementById('highscore').textContent = this.highScore;
  }
}

// ============================================================
//  🔧 HELPERS
// ============================================================
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawStar(ctx, cx, cy, outerR, innerR, points) {
  const step = Math.PI / points;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const angle = -Math.PI / 2 + i * step;
    if (i === 0) ctx.moveTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
    else ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
  }
  ctx.closePath();
}

window.addEventListener('DOMContentLoaded', () => {
  window.__snakeGame = new Game();
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden && window.__snakeGame && window.__snakeGame.state === 'playing') {
    window.__snakeGame.pauseGame();
  }
});
